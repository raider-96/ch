<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چگار - دخول</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
        body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;justify-content:center;align-items:center;color:#fff}
        .login-box{background:rgba(255,255,255,0.08);border-radius:24px;padding:45px 40px;width:400px;max-width:95%;border:1px solid rgba(255,255,255,0.15)}
        .logo{text-align:center;margin-bottom:35px}
        .logo .emoji{font-size:70px;margin-bottom:10px}
        .logo h1{font-size:48px;color:#f39c12;font-weight:900;margin-bottom:8px}
        .logo p{color:#888;font-size:14px}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;margin-bottom:8px;color:#ccc;font-size:14px}
        .form-group input{width:100%;padding:14px 18px;border:2px solid rgba(255,255,255,0.12);border-radius:14px;background:rgba(255,255,255,0.06);color:#fff;font-size:16px;outline:none;transition:all 0.3s}
        .form-group input:focus{border-color:#f39c12}
        .form-group input::placeholder{color:#666}
        .login-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(45deg,#e74c3c,#f39c12);color:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.3s}
        .login-btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(243,156,18,0.4)}
        .msg{text-align:center;margin-top:15px;padding:12px;border-radius:10px;font-size:14px;display:none}
        .msg.error{display:block;background:rgba(231,76,60,0.2);border:1px solid rgba(231,76,60,0.4);color:#ff6b6b}
        .msg.success{display:block;background:rgba(46,204,113,0.2);border:1px solid rgba(46,204,113,0.4);color:#2ecc71}
        .info-box{margin-top:20px;padding:15px;background:rgba(52,152,219,0.1);border:1px solid rgba(52,152,219,0.3);border-radius:12px;text-align:center}
        .info-box p{color:#87ceeb;font-size:13px;line-height:1.6}
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <div class="emoji">🎮</div>
            <h1>چگاار</h1>
            <p>لعبة الأسئلة الجماعية</p>
        </div>

        <div class="form-group">
            <label>👤 اسم المستخدم</label>
            <input type="text" id="username" placeholder="أدخل اليوزر الخاص بك">
        </div>
        <div class="form-group">
            <label>🔒 كلمة المرور</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور">
        </div>

        <button class="login-btn" onclick="login()">🚀 دخول</button>

        <div id="msg" class="msg"></div>

        <div class="info-box">
            <p>🔑 تحتاج يوزر خاص للدخول<br>تواصل مع الإدارة للحصول عليه</p>
        </div>
    </div>

    <script>
        fetch('/api/auth/me').then(function(r){return r.json()}).then(function(d){
            if(d.loggedIn){
                if(d.isAdmin) window.location.href='/admin.html';
                else window.location.href='/lobby.html';
            }
        });

        function login(){
            var username=document.getElementById('username').value.trim();
            var password=document.getElementById('password').value.trim();
            if(!username||!password){showMsg('أدخل البيانات','error');return}

            fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,password:password})})
            .then(function(r){return r.json()})
            .then(function(data){
                if(data.success){
                    showMsg(data.message,'success');
                    setTimeout(function(){
                        if(data.isAdmin) window.location.href='/admin.html';
                        else window.location.href='/lobby.html';
                    },800);
                } else {
                    showMsg(data.message,'error');
                }
            });
        }

        function showMsg(t,type){var m=document.getElementById('msg');m.textContent=t;m.className='msg '+type}

        document.addEventListener('keypress',function(e){if(e.key==='Enter')login()});
    </script>
</body>
</html>
